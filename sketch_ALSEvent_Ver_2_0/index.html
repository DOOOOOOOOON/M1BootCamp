<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>ALS Event iPad Controller (BLE)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <style>
    body { padding: 0; margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
    #settings {
      position: absolute; top: 10px; left: 10px; z-index: 999; /* 最前面に配置 */
      background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px;
      font-family: sans-serif; display: flex; align-items: center; gap: 10px;
    }
    /* iPad用にボタンを大きく、押しやすく調整 */
    button { 
      padding: 12px 24px; border-radius: 8px; border: none; 
      background: #007AFF; color: white; font-size: 18px; font-weight: bold;
      cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    button:active { background: #005bb5; transform: scale(0.95); }
    button:disabled { background: #ff4444; cursor: not-allowed; transform: none; }
    #bleStatus { font-size: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <!-- 設定パネル -->
  <div id="settings">
    <button id="bleBtn">Bluetoothで接続</button>
    <span id="bleStatus">未接続</span>
  </div>

  <!-- カスタムメッセージボックス（alertの代わり） -->
  <div id="msgBox" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(220,50,50,0.9); color:white; padding:20px; border-radius:10px; z-index:1000; text-align:center; font-family: sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
    <p id="msgText" style="margin-bottom: 15px; font-size: 16px; white-space: pre-wrap; line-height: 1.5;"></p>
    <button onclick="document.getElementById('msgBox').style.display='none'" style="background:#333; font-size: 16px;">閉じる</button>
  </div>

  <script>
    // --- ブラウザのBluetooth対応チェック ---
    document.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById('bleBtn');
      if (!navigator.bluetooth) {
        // Safariなど非対応ブラウザの場合、ボタンを赤くして警告
        btn.innerText = "⚠️ Safari非対応 (Bluefyを使ってください)";
        btn.disabled = true; 
        document.getElementById('bleStatus').innerText = "通信不可";
      } else {
        // 対応している場合のみイベント登録
        btn.addEventListener('click', connectBLE);
      }
    });

    // --- BLE関連 ---
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    let bleCharacteristic = null;

    async function connectBLE() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'ALS_M5StickC' }],
          optionalServices: [SERVICE_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
        
        document.getElementById('bleStatus').innerText = "✅ 接続済み！";
        document.getElementById('bleStatus').style.color = "#4CAF50";
        document.getElementById('bleBtn').style.display = "none"; // 接続後はボタンを隠す
        
        device.addEventListener('gattserverdisconnected', () => {
          document.getElementById('bleStatus').innerText = "❌ 切断されました";
          document.getElementById('bleStatus').style.color = "#ff4444";
          document.getElementById('bleBtn').style.display = "block";
          bleCharacteristic = null;
        });
      } catch (error) {
        console.error(error);
        let errorMsg = "接続がキャンセルされたか、失敗しました。";
        // プレビュー環境などでの権限エラーを検知
        if (error.name === 'SecurityError') {
           errorMsg = "セキュリティ設定によりBluetoothがブロックされました。\nこのプレビュー画面の中ではBluetoothを使用できません。\n\n右上のボタンから別タブで開くか、iPadのBluefyブラウザにURLをコピーして使用してください。";
        }
        document.getElementById('msgText').innerText = errorMsg;
        document.getElementById('msgBox').style.display = 'block';
        document.getElementById('bleStatus').innerText = "接続エラー";
      }
    }

    // --- UI設定パラメータ ---
    let cycleOrder = ["Right", "TurnOff", "TurnOn", "Up", "Left", "Down"];
    let currentIndex = 0;
    let interval = 2000;
    let lastChangeTime = 0;

    let capture;
    let isPressing = false;
    let lighton = false;

    let tiltcurrentangle = 90, pancurrentangle = 90, moveangle = 1;
    let lastSendAt = 0;
    const SEND_INTERVAL_MS = 60; 
    let lastTilt = -999, lastPan = -999;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      capture = createCapture({ audio: false, video: { facingMode: "environment" } });
      capture.hide();
      textFont('sans-serif');
      lastChangeTime = millis();
    }

    function draw() {
      background(0);

      // カメラ映像
      if (capture.loadedmetadata) {
        let scaleRate = max(width / capture.width, height / capture.height);
        let dw = capture.width * scaleRate;
        let dh = capture.height * scaleRate;
        let dx = (width - dw) / 2;
        let dy = (height - dh) / 2;
        image(capture, dx, dy, dw, dh);
      }

      // 照準
      push(); noFill(); stroke(255, 0, 0); strokeWeight(3);
      ellipse(width / 2, height / 2 + 50, 120, 120);
      pop();

      // オートスキャン
      if (!isPressing && millis() - lastChangeTime >= interval) {
        currentIndex = (currentIndex + 1) % cycleOrder.length;
        lastChangeTime = millis();
      }
      let currentHighlight = cycleOrder[currentIndex];

      drawOverlayGUI(currentHighlight);

      // 長押し中の実行
      if (isPressing) executeAction(currentHighlight);
      
      // テキスト
      push(); fill(255); textSize(16); textAlign(RIGHT, BOTTOM);
      text(`Laser: ${lighton ? "ON" : "OFF"}\nTilt: ${tiltcurrentangle}°\nPan: ${pancurrentangle}°`, width - 20, height - 20);
      pop();
    }

    function executeAction(action) {
      let changed = false;
      if (action === "Right") { pancurrentangle = constrain(pancurrentangle - moveangle, 0, 180); changed = true; }
      else if (action === "Left") { pancurrentangle = constrain(pancurrentangle + moveangle, 0, 180); changed = true; }
      else if (action === "Up")   { tiltcurrentangle = constrain(tiltcurrentangle + moveangle, 60, 110); changed = true; }
      else if (action === "Down") { tiltcurrentangle = constrain(tiltcurrentangle - moveangle, 60, 110); changed = true; }
      else if (action === "TurnOn" && !lighton) { lighton = true; sendCommand("light_on"); }
      else if (action === "TurnOff" && lighton) { lighton = false; sendCommand("light_off"); }

      if (changed) sendServoAngles();
    }

    function sendServoAngles() {
      let now = millis();
      if (now - lastSendAt >= SEND_INTERVAL_MS) {
        if (abs(tiltcurrentangle - lastTilt) > 0.001 || abs(pancurrentangle - lastPan) > 0.001) {
          sendCommand(`1:${Math.round(tiltcurrentangle)}`);
          sendCommand(`2:${Math.round(pancurrentangle)}`);
          lastTilt = tiltcurrentangle;
          lastPan = pancurrentangle;
          lastSendAt = now;
        }
      }
    }

    async function sendCommand(cmd) {
      if (!bleCharacteristic) return;
      try {
        let encoder = new TextEncoder();
        await bleCharacteristic.writeValueWithoutResponse(encoder.encode(cmd + '\n'));
      } catch (err) {
        console.log("BLE送信エラー", err);
      }
    }

    function drawOverlayGUI(highlight) {
      let btnW = 140, btnH = 50, btnY = 30;
      drawTopButton(width/2 + 20, btnY, btnW, btnH, "つける", highlight === "TurnOn");
      drawTopButton(width/2 + 180, btnY, btnW, btnH, "けす", highlight === "TurnOff");

      let arrowLong = max(80, min(width, height) * 0.15);
      let arrowThick = max(10, min(width, height) * 0.02);

      drawArrow(width - 60, height/2, 0, arrowLong, arrowThick, highlight === "Right");
      drawArrow(60, height/2, PI, arrowLong, arrowThick, highlight === "Left");
      drawArrow(width/2, 80, -HALF_PI, arrowLong, arrowThick, highlight === "Up");
      drawArrow(width/2, height - 80, HALF_PI, arrowLong, arrowThick, highlight === "Down");
    }

    function drawTopButton(x, y, w, h, label, isHi) {
      push(); rectMode(CORNER); strokeWeight(2); stroke(255);
      if (isHi) { fill(255); rect(x, y, w, h, 8); fill(0); } 
      else { fill(0, 150); rect(x, y, w, h, 8); fill(255); }
      textAlign(CENTER, CENTER); textSize(18); text(label, x + w/2, y + h/2);
      pop();
    }

    function drawArrow(cx, cy, rot, W, H, isHi) {
      let a = isHi ? 255 : 80;
      push(); translate(cx, cy); rotate(rot); noStroke(); fill(255, a);
      triangle(W/2, 0, -W/2, -H/2, -W/2, H/2);
      pop();
    }

    // ★修正点：画面のタッチ判定
    function touchStarted() {
      // 画面上部（ボタンがあるエリア）をタッチした場合は、ブラウザ本来のボタンタップ処理を優先する
      if (mouseY <= 80) {
        return; 
      }
      // それ以外の画面をタッチした場合は、アクションを実行する
      isPressing = true;
      executeAction(cycleOrder[currentIndex]);
      return false; // キャンバスのスクロールなどを防ぐ
    }
    
    function touchEnded() { 
      isPressing = false; 
    }
    
    function windowResized() { 
      resizeCanvas(windowWidth, windowHeight); 
    }
  </script>
</body>
</html>
