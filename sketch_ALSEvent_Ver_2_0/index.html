<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>ALS Event iPad Controller (Wi-Fi AP Offline)</title>
  <style>
    body { padding: 0; margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; }
    
    /* カメラの映像を背景に全画面表示 */
    #bgCamera {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: contain; 
      z-index: -1;         
      background-color: #111;
    }

    #settings {
      position: absolute; top: 10px; left: 10px; z-index: 999;
      background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 15px;
    }
    .row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }

    button { 
      padding: 8px 16px; border-radius: 8px; border: none; 
      background: #007AFF; color: white; font-size: 14px; font-weight: bold;
      cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    button:active { background: #005bb5; transform: scale(0.95); }
    
    input[type="text"] {
      padding: 6px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; width: 110px;
    }

    /* 描画用キャンバス */
    #uiCanvas {
      position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- カメラの映像を表示するタグ -->
  <img id="bgCamera" alt="ここにカメラの映像が映ります">

  <!-- 設定パネル -->
  <div id="settings">
    <div class="row">
      <span>マイコンIP(操作):</span>
      <input type="text" id="m5Ip" value="192.168.4.1">
    </div>
    <div class="row">
      <span>カメラIP(映像):</span>
      <input type="text" id="camIp" value="192.168.4.2">
      <button id="camBtn">映像を更新</button>
    </div>
  </div>

  <!-- UI描画用キャンバス -->
  <canvas id="uiCanvas"></canvas>

  <script>
    // --- 映像の表示処理 ---
    document.getElementById('camBtn').addEventListener('click', () => {
      const ip = document.getElementById('camIp').value;
      if (!ip) return;
      const bgImg = document.getElementById('bgCamera');
      // M5CameraやESP32-CAMの標準的な映像配信ポート（:81/stream）
      bgImg.src = `http://${ip}:81/stream`;
    });

    // --- UI設定パラメータ ---
    let cycleOrder = ["Right", "TurnOff", "TurnOn", "Up", "Left", "Down"];
    let currentIndex = 0;
    let interval = 2000;
    let lastChangeTime = Date.now();

    let isPressing = false;
    let lighton = false;
    let tiltcurrentangle = 90, pancurrentangle = 90, moveangle = 1;
    let lastSendAt = 0;
    const SEND_INTERVAL_MS = 60; 
    let lastTilt = -999, lastPan = -999;

    // --- キャンバスのセットアップ ---
    const canvas = document.getElementById('uiCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- 描画ループ (p5.jsのdrawの代わり) ---
    function draw() {
      ctx.clearRect(0, 0, width, height);

      // 照準
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(width / 2, height / 2 + 50, 60, 0, Math.PI * 2);
      ctx.stroke();

      // オートスキャン
      let now = Date.now();
      if (!isPressing && now - lastChangeTime >= interval) {
        currentIndex = (currentIndex + 1) % cycleOrder.length;
        lastChangeTime = now;
      }
      let currentHighlight = cycleOrder[currentIndex];

      drawOverlayGUI(currentHighlight);

      // 長押し中の実行
      if (isPressing) executeAction(currentHighlight);
      
      // ステータステキスト
      ctx.fillStyle = 'white';
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText(`Laser: ${lighton ? "ON" : "OFF"}`, width - 20, height - 60);
      ctx.fillText(`Tilt: ${Math.round(tiltcurrentangle)}°`, width - 20, height - 40);
      ctx.fillText(`Pan: ${Math.round(pancurrentangle)}°`, width - 20, height - 20);

      requestAnimationFrame(draw);
    }
    // ループ開始
    requestAnimationFrame(draw);

    function executeAction(action) {
      let changed = false;
      if (action === "Right") { pancurrentangle = Math.max(0, Math.min(180, pancurrentangle - moveangle)); changed = true; }
      else if (action === "Left") { pancurrentangle = Math.max(0, Math.min(180, pancurrentangle + moveangle)); changed = true; }
      else if (action === "Up")   { tiltcurrentangle = Math.max(60, Math.min(110, tiltcurrentangle + moveangle)); changed = true; }
      else if (action === "Down") { tiltcurrentangle = Math.max(60, Math.min(110, tiltcurrentangle - moveangle)); changed = true; }
      else if (action === "TurnOn" && !lighton) { lighton = true; sendCommand("light_on"); }
      else if (action === "TurnOff" && lighton) { lighton = false; sendCommand("light_off"); }

      if (changed) sendServoAngles();
    }

    function sendServoAngles() {
      let now = Date.now();
      if (now - lastSendAt >= SEND_INTERVAL_MS) {
        if (Math.abs(tiltcurrentangle - lastTilt) > 0.001 || Math.abs(pancurrentangle - lastPan) > 0.001) {
          sendCommand(`1:${Math.round(tiltcurrentangle)}`);
          sendCommand(`2:${Math.round(pancurrentangle)}`);
          lastTilt = tiltcurrentangle;
          lastPan = pancurrentangle;
          lastSendAt = now;
        }
      }
    }

    // --- マイコンへのコマンド送信 (Wi-Fi/HTTP) ---
    function sendCommand(cmd) {
      let ip = document.getElementById('m5Ip').value;
      if (!ip) return;
      fetch(`http://${ip}/action?cmd=${cmd}`, { mode: 'no-cors' })
        .catch(err => console.log("通信エラー", err));
    }

    function drawOverlayGUI(highlight) {
      let btnW = 140, btnH = 50, btnY = 30;
      drawTopButton(width/2 + 20, btnY, btnW, btnH, "つける", highlight === "TurnOn");
      drawTopButton(width/2 + 180, btnY, btnW, btnH, "けす", highlight === "TurnOff");

      let arrowLong = Math.max(80, Math.min(width, height) * 0.15);
      let arrowThick = Math.max(10, Math.min(width, height) * 0.02);

      drawArrow(width - 60, height/2, 0, arrowLong, arrowThick, highlight === "Right");
      drawArrow(60, height/2, Math.PI, arrowLong, arrowThick, highlight === "Left");
      drawArrow(width/2, 80, -Math.PI/2, arrowLong, arrowThick, highlight === "Up");
      drawArrow(width/2, height - 80, Math.PI/2, arrowLong, arrowThick, highlight === "Down");
    }

    function drawTopButton(x, y, w, h, label, isHi) {
      ctx.save();
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'white';
      
      // 角丸四角形の描画 (対応ブラウザ向け)
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(x, y, w, h, 8);
      } else {
        ctx.rect(x, y, w, h); // フォールバック
      }
      
      if (isHi) {
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.fillStyle = 'black';
      } else {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fill();
        ctx.fillStyle = 'white';
      }
      ctx.stroke();

      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, x + w/2, y + h/2);
      ctx.restore();
    }

    function drawArrow(cx, cy, rot, W, H, isHi) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      
      ctx.fillStyle = isHi ? 'rgba(255, 255, 255, 1)' : 'rgba(255, 255, 255, 0.3)';
      ctx.beginPath();
      ctx.moveTo(W/2, 0);
      ctx.lineTo(-W/2, -H/2);
      ctx.lineTo(-W/2, H/2);
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
    }

    // --- タッチ操作イベント ---
    function handleTouchStart(e) {
      let touchY = e.touches ? e.touches[0].clientY : e.clientY;
      // 設定パネルエリアをタッチした場合は無視
      if (touchY <= 150) return; 
      
      e.preventDefault(); // スクロール防止
      isPressing = true;
      executeAction(cycleOrder[currentIndex]);
    }
    
    function handleTouchEnd(e) { 
      isPressing = false; 
    }

    // document全体にイベントを紐付け（Canvasはpointer-events: noneにしているため）
    document.addEventListener('touchstart', handleTouchStart, { passive: false });
    document.addEventListener('mousedown', handleTouchStart);
    document.addEventListener('touchend', handleTouchEnd);
    document.addEventListener('mouseup', handleTouchEnd);

  </script>
</body>
</html>
